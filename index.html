<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawabox Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        button {
            font-size: 20px;
            padding: 12px 25px;
            cursor: pointer;
        }

        li {
            text-align: left;
            font-size: 22px;
            margin: 10px;
        }
    </style>
</head>

<body>

<h1>Today's 20min Drawing Workout</h1>

<button onclick="generateWorkout()">Pick 3 Exercises</button>

<ul id="workout"></ul>


<script>

const exercises = [
    "https://drawabox.com/lesson/1/superimposedlines",
    "https://drawabox.com/lesson/1/ghostedlines",
    "https://drawabox.com/lesson/1/ghostedplanes",
    "https://drawabox.com/lesson/1/tablesofellipses",
    "https://drawabox.com/lesson/1/ellipsesinplanes",
    "https://drawabox.com/lesson/1/funnels",
    "https://drawabox.com/lesson/1/plottedperspective",
    "https://drawabox.com/lesson/1/roughperspective",
    "https://drawabox.com/lesson/1/rotatedboxes",
    "https://drawabox.com/lesson/1/organicperspective",
    "https://drawabox.com/lesson/2/textureanalysis",
    "https://drawabox.com/lesson/2/dissections",
    "https://drawabox.com/lesson/2/formintersections",
    "https://drawabox.com/lesson/2/organicintersections",
    "Box Challenge"
];

<h1>Then 1 hour of Play</h1>

function generateWorkout() {

    // Copy and shuffle the list
    let shuffled = [...exercises].sort(() => Math.random() - 0.5);

    // Take first 3
    let selected = shuffled.slice(0, 3);

    // Display results
    document.getElementById("workout").innerHTML =
        selected.map(exercise => `<li>${exercise}</li>`).join("");
}

</script>

</body>
</html>
